name: CI - Versioning and Model Inference Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install monai

      - name: Run versioning/regression-gate tests
        run: python3 -m pytest test_version_and_benchmark.py -v

      - name: Run model inference smoke test
        run: python3 -m pytest test_model_inference.py -v
